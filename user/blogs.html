<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Events - SAVANT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --savant-primary-green: #087830;
      --savant-accent-green: #12aa42;
    }

    * {
      font-family: 'Poppins', sans-serif !important;
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      /* Binago sa Pure White para pareho sa Application Form */
      background-color: #ffffff;
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      color: #333;
      /* Dark text para sa white background */
    }

    /* BACK BUTTON (White Style) */
    .btn-back-circle {
      position: fixed;
      top: 30px;
      left: 30px;
      width: 50px;
      height: 50px;
      background: #ffffff;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      text-decoration: none;
      z-index: 1000;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    }

    .btn-back-circle:hover {
      background: var(--savant-primary-green);
      color: white;
      transform: scale(1.1);
      border-color: var(--savant-primary-green);
    }

    /* Minimalist Background elements instead of image overlay */
    .bg-accent-shape {
      position: absolute;
      top: -10%;
      right: -5%;
      width: 400px;
      height: 400px;
      background: rgba(18, 170, 66, 0.05);
      border-radius: 50%;
      z-index: -1;
    }

    .container {
      text-align: center;
      z-index: 1;
    }

    .logo-img {
      height: 120px;
      margin-bottom: 30px;
      filter: drop-shadow(0 5px 15px rgba(0, 0, 0, 0.05));
    }

    .tba-text {
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 800;
      letter-spacing: 5px;
      color: var(--savant-primary-green);
      text-transform: uppercase;
      margin: 0;
      line-height: 1.2;
    }

    .sub-text {
      font-size: 1.1rem;
      color: #777;
      margin-top: 15px;
      letter-spacing: 2px;
      font-weight: 400;
      text-transform: uppercase;
    }

    @keyframes pulse-soft {
      0% {
        transform: scale(1);
        opacity: 0.9;
      }

      50% {
        transform: scale(1.02);
        opacity: 1;
      }

      100% {
        transform: scale(1);
        opacity: 0.9;
      }
    }

    .tba-text {
      animation: pulse-soft 3s infinite ease-in-out;
    }

    @media (max-width: 768px) {
      .btn-back-circle {
        top: 20px;
        left: 20px;
        width: 45px;
        height: 45px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-accent-shape"></div>

  <a href="index.html" class="btn-back-circle" title="Back to Home">
    <i class="bi bi-chevron-left fs-4"></i>
  </a>

  <div class="container">
    <img src="img/logo.png" class="logo-img" alt="SAVANT Logo">

    <h1 class="tba-text">To Be Announced</h1>
    <p class="sub-text">Stay tuned for upcoming events</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
