<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Application Form - SAVANT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --savant-green: #087830;
      --savant-light-green: #12aa42;
    }

    * {
      font-family: 'Poppins', sans-serif !important;
    }

    body {
      background-color: #ffffff;
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* BACK BUTTON STYLE */
    .btn-back-circle {
      position: fixed;
      top: 30px;
      left: 30px;
      width: 50px;
      height: 50px;
      background: rgba(0, 0, 0, 0.05);
      /* Darker konti para makita sa white bg */
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      text-decoration: none;
      z-index: 100;
      transition: all 0.3s ease;
    }

    .btn-back-circle:hover {
      background: var(--savant-green);
      color: white;
      transform: scale(1.1);
    }

    .form-card {
      background-color: #ffffff;
      width: 100%;
      max-width: 650px;
      border-radius: 25px;
      overflow: hidden;
      box-shadow: 0 15px 50px rgba(0, 0, 0, 0.1);
      margin: 20px;
      border: 1px solid #f0f0f0;
      position: relative;
    }

    .form-header {
      background-color: var(--savant-green);
      color: white;
      padding: 35px;
      text-align: center;
    }

    .form-header h2 {
      font-weight: 700;
      margin: 0;
      font-size: 1.6rem;
      text-transform: uppercase;
    }

    .form-body {
      padding: 40px;
    }

    .form-label {
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    .form-control,
    .form-select {
      background-color: #f9f9f9;
      border: 1px solid #ededed;
      padding: 12px 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .btn-submit {
      background-color: var(--savant-green);
      color: white;
      border: none;
      padding: 14px;
      width: 100%;
      border-radius: 12px;
      font-weight: 600;
      transition: 0.3s;
      cursor: pointer;
    }

    .btn-submit:hover {
      background-color: var(--savant-light-green);
      transform: translateY(-2px);
    }

    .required {
      color: #ff4d4d;
    }

    ::-webkit-scrollbar {
      width: 0px;
    }
  </style>
</head>

<body>

  <a href="index.html" class="btn-back-circle" title="Back to Home">
    <i class="bi bi-chevron-left fs-4"></i>
  </a>

  <div class="form-card">
    <div class="form-header">
      <img src="img/logo.png" alt="Savant Logo" style="height: 60px; margin-bottom: 10px;">
      <h2>Form of Booking</h2>
    </div>
    <div class="form-body">
      <form id="bookingForm">
        <div class="mb-1">
          <label class="form-label">Name <span class="required">*</span></label>
          <input type="text" class="form-control" placeholder="Your full name" required>
        </div>
        <div class="mb-1">
          <label class="form-label">Email <span class="required">*</span></label>
          <input type="email" class="form-control" placeholder="email@example.com" required>
        </div>
        <div class="mb-1">
          <label class="form-label">Contact No. <span class="required">*</span></label>
          <input type="tel" class="form-control" placeholder="09XX XXX XXXX" required>
        </div>
        <div class="mb-1">
          <label class="form-label">Current Education Background <span class="required">*</span></label>
          <select class="form-select" required>
            <option value="" selected disabled>Select Education Level</option>
            <option>Senior High School Graduate</option>
            <option>College Level</option>
            <option>College Graduate</option>
            <option>Master's Degree / Others</option>
          </select>
        </div>
        <div class="mb-2">
          <label class="form-label">Destination <span class="required">*</span></label>
          <select class="form-select" required>
            <option value="" selected disabled>Select Target Country</option>
            <option>Canada</option>
            <option>United Kingdom</option>
            <option>Australia</option>
            <option>USA</option>
          </select>
        </div>
        <button type="submit" class="btn-submit">Submit Application</button>
      </form>
    </div>
  </div>

  <script>
    document.getElementById('bookingForm').addEventListener('submit', function (e) {
      e.preventDefault();
      alert('Application Sent Successfully!');
      this.reset();
    });
  </script>
</body>

</html>
