<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savant-International Student Mobility | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .bg-container {
      background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                        url('img/bg.png'); /* Palitan ang path base sa file mo */
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 35px;
      padding: 4rem 3.5rem;
      max-width: 1000px;
      width: 90%;
      color: white;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-img {
      width: 120px;
      filter: brightness(0) invert(1);
    }

    .logo-text {
      font-size: 1.5rem;
      font-weight: 500;
      line-height: 1.1;
    }

    .form-title {
      font-size: 2rem;
      font-weight: 600;
      margin-bottom: 5px;
    }

    .form-subtitle {
      font-size: 0.9rem;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    /* Input Styling */
    .input-box {
      background: rgba(255, 255, 255, 0.3);
      border-radius: 10px;
      padding: 10px 15px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .input-label {
      display: block;
      font-size: 0.75rem;
      color: rgba(0, 0, 0, 0.6);
      margin-bottom: 2px;
    }

    .custom-input {
      background: transparent;
      border: none;
      width: 100%;
      color: #222;
      font-weight: 500;
      outline: none;
      padding: 0;
    }

    /* Button Styling */
    .btn-login {
      background-color: #1a8241;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 12px;
      width: 100%;
      font-weight: 700;
      font-size: 1.1rem;
      transition: 0.3s;
    }

    .btn-login:hover {
      background-color: #146633;
      transform: translateY(-2px);
    }

    .footer-links {
      display: flex;
      justify-content: space-between;
      margin-top: 15px;
      font-size: 0.8rem;
    }

    .footer-links a {
      color: white;
      text-decoration: none;
      opacity: 0.8;
    }

    .footer-links a:hover {
      opacity: 1;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="bg-container">
    <div class="glass-card">
      <div class="row align-items-center">
        <div class="col-lg-6 mb-5 mb-lg-0">
          <div class="logo-section">
            <img src="img/logo.png" class="logo-img">
            <div class="logo-text">
              Savant-International<br>Student Mobility
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <h2 class="form-title">Login to your Account</h2>
          <p class="form-subtitle">Welcome! Please enter your email address</p>
          
          <form>
            <div class="input-box">
              <span class="input-label">Email</span>
              <input type="email" class="custom-input">
            </div>

            <div class="input-box">
              <span class="input-label">Password</span>
              <input type="password" class="custom-input">
            </div>

            <button type="submit" class="btn btn-login">Login</button>
            
            <div class="footer-links">
              <a href="#">Don't have an account?</a>
              <a href="#">Forgot Password?</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
