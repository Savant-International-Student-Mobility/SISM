<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Savant-International Login</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<style>
		body {
			/* Replace with the actual URL of the campus background image */
			background: url('img/bg.png') no-repeat center center fixed;
			background-size: cover;
			height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			margin: 0;
		}

		.glass-panel {
			background: rgba(255, 255, 255, 0.15);
			backdrop-filter: blur(10px);
			-webkit-backdrop-filter: blur(10px);
			border: 1px solid rgba(255, 255, 255, 0.2);
			border-radius: 25px;
			padding: 4rem;
			width: 90%;
			max-width: 1000px;
			color: white;
		}

		.form-control {
			background: rgba(255, 255, 255, 0.3) !important;
			border: none;
			color: white !important;
			padding: 0.8rem;
		}

		.form-control::placeholder {
			color: rgba(255, 255, 255, 0.7);
		}

		.btn-login {
			background-color: #1a874b;
			border: none;
			padding: 0.8rem;
			font-weight: bold;
		}

		.btn-login:hover {
			background-color: #146c3a;
		}

		.logo-text {
			font-size: 1.5rem;
			line-height: 1.2;
		}

		a {
			text-decoration: none;
			color: rgba(255, 255, 255, 0.8);
			font-size: 0.9rem;
		}

		a:hover {
			color: white;
		}
	</style>
</head>

<body>

	<div class="glass-panel">
		<div class="row align-items-center">
			<div class="col-md-6 mb-4 mb-md-0 d-flex align-items-center">
				<div class="me-3">
					<img src="img/logo.png" alt="Savant Logo" style="width: 00px; height: auto;">
				</div>
			</div>

			<div class="col-md-6">
				<h3 class="fw-normal mb-1">Login to your Account</h3>
				<p class="small mb-4">Welcome! Please enter your email address</p>

				<form>
					<div class="mb-3">
						<input type="email" class="form-control" placeholder="Email">
					</div>
					<div class="mb-3">
						<input type="password" class="form-control" placeholder="Password">
					</div>
					<button type="submit" class="btn btn-login w-100 text-white mb-3">Login</button>

					<div class="d-flex justify-content-between">
						<a href="#">Don't have an account?</a>
						<a href="#">Forgot Password?</a>
					</div>
				</form>
			</div>
		</div>
	</div>

</body>

</html>
