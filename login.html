<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savant-International Student Mobility | Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .bg-container {
      background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
                        url('img/bg.png'); /* Siguraduhing tama ang file path mo */
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Adjusted for a more solid, less glassy look */
    .main-card {
      background: rgba(35, 35, 35, 0.4); /* Mas dark at less transparent */
      backdrop-filter: blur(5px); /* Binawasan ang blur */
      -webkit-backdrop-filter: blur(5px);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 30px;
      padding: 4rem 3.5rem;
      max-width: 1000px;
      width: 90%;
      color: white;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-img {
      width: 130px;
      filter: brightness(0) invert(1);
    }

    .logo-brand-text {
      font-size: 1.6rem;
      font-weight: 500;
      line-height: 1.2;
    }

    .form-heading {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .form-subtext {
      font-size: 0.85rem;
      margin-bottom: 25px;
      color: rgba(255, 255, 255, 0.8);
    }

    /* Input Styling based on your image */
    .input-field-group {
      background: rgba(210, 210, 210, 0.9); /* Halos solid na kulay grey-white */
      border-radius: 12px;
      padding: 10px 18px;
      margin-bottom: 18px;
      border: none;
    }

    .field-label {
      display: block;
      font-size: 0.75rem;
      color: #555;
      font-weight: 600;
      margin-bottom: 2px;
    }

    .form-input {
      background: transparent;
      border: none;
      width: 100%;
      color: #111;
      font-weight: 500;
      outline: none;
      padding: 0;
      font-size: 1rem;
    }

    /* Login Button */
    .btn-submit-login {
      background-color: #1a8241;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px;
      width: 100%;
      font-weight: 700;
      font-size: 1.1rem;
      margin-top: 10px;
      transition: all 0.3s ease;
    }

    .btn-submit-login:hover {
      background-color: #146633;
      box-shadow: 0 5px 15px rgba(26, 130, 65, 0.4);
    }

    .footer-action-links {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      font-size: 0.85rem;
    }

    .footer-action-links a {
      color: #fff;
      text-decoration: none;
      opacity: 0.85;
    }

    .footer-action-links a:hover {
      opacity: 1;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="bg-container">
    <div class="main-card">
      <div class="row align-items-center">
        <div class="col-lg-6 mb-5 mb-lg-0">
          <div class="logo-container">
            <img src="img/logo.png" class="logo-img" alt="Savant Logo">
            <div class="logo-brand-text">
              Savant-International<br>Student Mobility
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <h2 class="form-heading">Login to your Account</h2>
          <p class="form-subtext">Welcome! Please enter your email address</p>
          
          <form>
            <div class="input-field-group">
              <label class="field-label">Email</label>
              <input type="email" class="form-input" required>
            </div>

            <div class="input-field-group">
              <label class="field-label">Password</label>
              <input type="password" class="form-input" required>
            </div>

            <button type="submit" class="btn-submit-login">Login</button>
            
            <div class="footer-action-links">
              <a href="#">Don't have an account?</a>
              <a href="#">Forgot Password?</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
