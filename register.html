<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savant-International Student Mobility | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body,
    html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .bg-container {
      background-image: linear-gradient(rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2)),
        url('img/bg.png');
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .glass-card {
      background: rgba(70, 69, 69, 0.12);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 40px;
      padding: 3rem 2.5rem;
      max-width: 900px;
      width: 90%;
      color: white;
    }

    .logo-box {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-img {
      width: 100%;
      max-width: 320px;
      height: auto;
    }

    .form-control {
      background: #cecece;
      border: 1px solid #919191;
      color: #212529 !important;
      padding: 0.8rem 1.2rem;
      border-radius: 12px;
      margin-bottom: 1.2rem;
    }

    .form-control::placeholder {
      color: #6c757d;
      font-size: 0.9rem;
    }

    .form-control:focus {
      background: #fff;
      border-color: #1a8241;
      box-shadow: 0 0 8px rgba(26, 130, 65, 0.2);
    }

    .btn-register {
      background-color: #1a8241;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 0.8rem;
      width: 100%;
      font-weight: 600;
      transition: 0.3s;
    }

    .btn-register:hover {
      background-color: #146633;
      color: white;
    }

    .form-check-label {
      font-size: 0.85rem;
    }

    .login-footer {
      text-align: center;
      font-size: 0.85rem;
      margin-top: 15px;
    }

    .login-footer a {
      color: white;
      text-decoration: none;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="bg-container">
    <div class="glass-card">
      <div class="row align-items-center">
        <div class="col-lg-5 mb-5 mb-lg-0">
          <div class="logo-box">
            <img src="img/logo.png" class="logo-img" style="filter: brightness(0) invert(1);">
          </div>
        </div>
        <div class="col-lg-7">
          <h2 class="fw-bold mb-0">Register Now</h2>
          <p class="fst-italic small mb-4">Please enter the following information</p>
          <form>
            <div class="row g-3">
              <div class="col-md-6">
                <input type="text" class="form-control" placeholder="First Name">
              </div>
              <div class="col-md-6">
                <input type="text" class="form-control" placeholder="Last Name">
              </div>
            </div>
            <input type="text" class="form-control" placeholder="Address">
            <input type="tel" class="form-control" placeholder="Phone Number">
            <input type="email" class="form-control" placeholder="Email">
            <input type="password" class="form-control" placeholder="Password">
            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="terms">
              <label class="form-check-label" for="terms">
                I agree to the Terms & Conditions
              </label>
            </div>
            <button type="submit" class="btn btn-register">Create Account</button>
            <div class="login-footer">
              <a href="#">Already have an account?</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
