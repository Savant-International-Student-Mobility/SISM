<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savant-International Student Mobility | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .bg-container {
      background-image: linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.45)),
                        url('img/bg.png'); /* Siguraduhing tama ang file path mo */
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .main-card {
      background: rgba(35, 35, 35, 0.4); 
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border: 1.5px solid rgba(255, 255, 255, 0.15);
      border-radius: 30px;
      padding: 3.5rem;
      max-width: 1100px;
      width: 95%;
      color: white;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-img {
      width: 140px;
      filter: brightness(0) invert(1);
    }

    .logo-brand-text {
      font-size: 1.6rem;
      font-weight: 500;
      line-height: 1.2;
    }

    .form-heading {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .form-subtext {
      font-size: 0.85rem;
      font-style: italic;
      margin-bottom: 20px;
      color: rgba(255, 255, 255, 0.8);
    }

    /* Solid Input Styling */
    .input-field-group {
      background: rgba(210, 210, 210, 0.9);
      border-radius: 12px;
      padding: 8px 15px;
      margin-bottom: 12px;
      border: none;
    }

    .field-label {
      display: block;
      font-size: 0.7rem;
      color: #555;
      font-weight: 600;
      margin-bottom: 0;
    }

    .form-input {
      background: transparent;
      border: none;
      width: 100%;
      color: #111;
      font-weight: 500;
      outline: none;
      padding: 0;
      font-size: 0.95rem;
    }

    /* Register Button */
    .btn-submit-register {
      background-color: #1a8241;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      width: 100%;
      font-weight: 700;
      font-size: 1.1rem;
      margin-top: 10px;
      transition: all 0.3s ease;
    }

    .btn-submit-register:hover {
      background-color: #146633;
      box-shadow: 0 5px 15px rgba(26, 130, 65, 0.4);
    }

    .form-check-label {
      font-size: 0.8rem;
    }

    .footer-link-center {
      display: block;
      text-align: center;
      margin-top: 15px;
      font-size: 0.85rem;
      color: #fff;
      text-decoration: none;
      opacity: 0.85;
    }

    .footer-link-center:hover {
      opacity: 1;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <div class="bg-container">
    <div class="main-card">
      <div class="row align-items-center">
        <div class="col-lg-5 mb-5 mb-lg-0">
          <div class="logo-container">
            <img src="img/logo.png" class="logo-img" alt="Savant Logo">
            <div class="logo-brand-text">
              Savant-International<br>Student Mobility
            </div>
          </div>
        </div>

        <div class="col-lg-7">
          <h2 class="form-heading">Register Now</h2>
          <p class="form-subtext">Please enter the following Information</p>
          
          <form>
            <div class="row g-2">
              <div class="col-md-6">
                <div class="input-field-group">
                  <label class="field-label">First Name</label>
                  <input type="text" class="form-input" required>
                </div>
              </div>
              <div class="col-md-6">
                <div class="input-field-group">
                  <label class="field-label">Last Name</label>
                  <input type="text" class="form-input" required>
                </div>
              </div>
            </div>

            <div class="input-field-group">
              <label class="field-label">Address</label>
              <input type="text" class="form-input" required>
            </div>

            <div class="input-field-group">
              <label class="field-label">Phone Number</label>
              <input type="tel" class="form-input" required>
            </div>

            <div class="input-field-group">
              <label class="field-label">Email</label>
              <input type="email" class="form-input" required>
            </div>

            <div class="input-field-group">
              <label class="field-label">Password</label>
              <input type="password" class="form-input" required>
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="terms" required>
              <label class="form-check-label" for="terms">
                I agree to the Terms & Conditions
              </label>
            </div>

            <button type="submit" class="btn-submit-register">Create Account</button>
            <a href="login.html" class="footer-link-center">Already have an account?</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
