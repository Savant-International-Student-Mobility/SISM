<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SAVANT - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">

  <style>
    * {
      font-family: 'Poppins', sans-serif !important;
    }

    .main-container {
      position: relative;
      height: 100vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* The Glassmorphism Card */
    .glass-card {
      background: rgba(47, 45, 45, 0.1);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 30px;
      padding: 60px;
      width: 100%;
      max-width: 1100px;
      color: white;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    /* Input styling to match the image */
    .form-control-glass {
      background: rgba(255, 255, 255, 0.2) !important;
      border: none !important;
      color: white !important;
      padding: 12px 20px;
      border-radius: 8px;
    }

    .form-control-glass::placeholder {
      color: rgba(255, 255, 255, 0.6);
    }

    .btn-login {
      background-color: #1a874b;
      border: none;
      padding: 12px;
      font-weight: 500;
      border-radius: 8px;
      transition: background 0.3s ease;
    }

    .btn-login:hover {
      background-color: #146c3a;
    }

    .login-links a {
      color: rgba(255, 255, 255, 0.8);
      text-decoration: none;
      font-size: 0.9rem;
    }

    .login-links a:hover {
      color: white;
    }
  </style>
</head>

<body class="vh-100 overflow-hidden bg-black">

  <div class="main-container">
    <img src="img/bg.png" class="position-absolute top-0 start-0 w-100 h-100 object-fit-cover" style="z-index: -2;">
    <div class="position-absolute top-0 start-0 w-100 h-100 bg-dark opacity-50" style="z-index: -1;"></div>

    <div class="glass-card">
      <div class="row align-items-center">

        <div class="col-lg-6 d-flex align-items-center mb-5 mb-lg-0">
          <img src="img/logo.png" alt="Logo" class="me-3" style="width: 400px; height: auto;">
        </div>

        <div class="col-lg-6">
          <h3 class="fw-semibold mb-1">Login to your Account</h3>
          <p class="small mb-4 text-white-50">Welcome! Please enter your email address</p>

          <form>
            <div class="mb-3">
              <input type="email" class="form-control form-control-glass" placeholder="Email" required>
            </div>
            <div class="mb-3">
              <input type="password" class="form-control form-control-glass" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-login w-100 text-white mb-3">Login</button>

            <div class="d-flex justify-content-between login-links">
              <a href="#">Don't have an account?</a>
              <a href="#">Forgot Password?</a>
            </div>
          </form>
        </div>

      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
