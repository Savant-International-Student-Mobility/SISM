<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savant-International Student Mobility | Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .bg-container {
      background-image: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)),
                        url('img/bg.png'); /* Siguraduhing tama ang path ng image mo */
      background-size: cover;
      background-position: center;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .glass-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 35px;
      padding: 3.5rem;
      max-width: 1100px;
      width: 95%;
      color: white;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }

    .logo-section {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .logo-img {
      width: 140px; /* Mas malaki gaya ng sa image */
      filter: brightness(0) invert(1);
    }

    .logo-text {
      font-size: 1.6rem;
      font-weight: 500;
      line-height: 1.1;
    }

    .form-title {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 5px;
    }

    .form-subtitle {
      font-style: italic;
      font-weight: 300;
      margin-bottom: 25px;
      opacity: 0.9;
    }

    /* Input Box Styling */
    .input-group-custom {
      background: rgba(255, 255, 255, 0.25);
      border-radius: 12px;
      padding: 8px 15px;
      margin-bottom: 15px;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .input-label-small {
      display: block;
      font-size: 0.75rem;
      color: rgba(0, 0, 0, 0.6); /* Darker label like in the UI */
      margin-bottom: -2px;
    }

    .custom-input {
      background: transparent;
      border: none;
      width: 100%;
      color: #333;
      font-weight: 500;
      outline: none;
      padding: 0;
    }

    .custom-input::placeholder {
      color: rgba(0, 0, 0, 0.4);
    }

    /* Checkbox & Button */
    .form-check-label {
      font-size: 0.85rem;
    }

    .btn-create {
      background-color: #1a8241;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 12px;
      width: 100%;
      font-weight: 700;
      font-size: 1.1rem;
      margin-top: 10px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .login-link {
      display: block;
      text-align: center;
      color: white;
      text-decoration: none;
      font-size: 0.85rem;
      margin-top: 15px;
      opacity: 0.9;
    }
  </style>
</head>

<body>
  <div class="bg-container">
    <div class="glass-card">
      <div class="row align-items-center">
        <div class="col-lg-6 mb-5 mb-lg-0">
          <div class="logo-section">
            <img src="img/logo.png" class="logo-img">
            <div class="logo-text">
              Savant-International<br>Student Mobility
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <h1 class="form-title">Register Now</h1>
          <p class="form-subtitle">Please enter the following Information</p>
          
          <form>
            <div class="row g-2">
              <div class="col-md-6">
                <div class="input-group-custom">
                  <span class="input-label-small">First Name</span>
                  <input type="text" class="custom-input">
                </div>
              </div>
              <div class="col-md-6">
                <div class="input-group-custom">
                  <span class="input-label-small">Last Name</span>
                  <input type="text" class="custom-input">
                </div>
              </div>
            </div>

            <div class="input-group-custom">
              <span class="input-label-small">Address</span>
              <input type="text" class="custom-input">
            </div>

            <div class="input-group-custom">
              <span class="input-label-small">Phone Number</span>
              <input type="tel" class="custom-input">
            </div>

            <div class="input-group-custom">
              <span class="input-label-small">Email</span>
              <input type="email" class="custom-input">
            </div>

            <div class="input-group-custom">
              <span class="input-label-small">Password</span>
              <input type="password" class="custom-input">
            </div>

            <div class="form-check mb-3">
              <input class="form-check-input" type="checkbox" id="terms">
              <label class="form-check-label" for="terms">
                I agree to the Terms & Conditions
              </label>
            </div>

            <button type="submit" class="btn btn-create">Create Account</button>
            <a href="#" class="login-link">Already have an account?</a>
          </form>
        </div>
      </div>
    </div>
  </div>
</body>

</html>
